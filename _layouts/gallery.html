---
layout: default
title:  '- bl3ak Miniatures -'
---

<div class="blank-block"></div>
<h1 style="text-align: center;">Gallery</h1>
<div class="blank-block"></div>

      <div class="archive-tags">
        <h3 style="text-align: center;">Tags</h3>
        <ul>
          <li class="tag-item">
            <a href="#"
               class="tag-filter"
               data-tag="all">
                All Posts
            </a>
        </li>
          {% for tag in site.tags %}
          <li class="tag-item">
            <a href="#"
              class="tag-filter"
              data-tag="{{ tag[0] | downcase }}">
              {{ tag[0] }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </div>

<div class="blank-block"></div>
<div class="gallery-container">
    {% for post in site.posts %}
        {% if post.image %}
        <div class="gallery-item"
             data-tags="{{ post.tags | join: ', ' | downcase }}">
            <a href="{{ post.url }}">
                <img src="{{ post.image }}"
                     alt="{{ post.title }}"
                     loading="lazy">

                <div class="overlay">
                    <h3>{{ post.title }}</h3>
                </div>
            </a>
        </div>
        {% endif %}
    {% endfor %}
</div>

<div class="blank-block"></div>
<div class="blank-block"></div>
