title: =][=
url: "https://beta.bl3ak.com"
baseurl: ""
description: "A hobby blog covering Warhammer, painting, conversions, and grimdark projects."

plugins:
  - jekyll-paginate-v2
  - jekyll-sass-converter
  - jekyll-feed
  - jekyll-og-image
  - jekyll-seo-tag

pagination:
  enabled: true
  per_page: 6
  permalink: /blog/:num/
  sort_field: date
  sort_reverse: true

gallery_tags:
  - fantasy
  - sci-fi
  - vehicles

og_image:
  collections: ["posts", "pages"]
  output_dir: "assets/images/og"
  domain: "beta.bl3ak.com"
  canvas:
    width: 1200
    height: 630
  border_bottom:
    width: 20
    fill:
      - "#4285F4"

twitter:
  card: summary_large_image